{% extends "layouts/base.html" %}

{% block page_title %}
Delete Order
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-md p-6">
        <div class="text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-500 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            <h2 class="text-2xl font-semibold text-gray-800 mt-4">Delete Order</h2>
            <p class="text-gray-500 mt-2">
                Are you sure you want to delete order #<span class="font-medium text-gray-900">{{ order.id }}</span>? This action cannot be undone.
            </p>
        </div>

        <form method="POST" class="mt-6">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <a href="{% url 'order_detail' order.pk %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-error">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
