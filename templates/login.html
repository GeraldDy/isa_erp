<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMD ERP - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/daisyui.min.css' %}" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8">

        <div class="text-center mb-8">
            <img src="{% static 'images/logo.svg' %}" alt="MMD ERP Logo" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
            <p class="text-gray-500 mt-2">Login to access your dashboard.</p>
        </div>

        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="alert alert-error shadow-sm">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    <span>{{ message }}</span>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="username" class="label">
                    <span class="label-text">Username</span>
                </label>
                <input type="text" name="username" id="username" required class="input input-bordered w-full">
            </div>

            <div>
                <label for="password" class="label">
                    <span class="label-text">Password</span>
                </label>
                <input type="password" name="password" id="password" required class="input input-bordered w-full">
            </div>

            <div class="flex items-center justify-between text-sm">
                <div class="form-control">
                    <label class="label cursor-pointer">
                        <input type="checkbox" name="remember" class="checkbox checkbox-primary" />
                        <span class="label-text ml-2">Remember me</span>
                    </label>
                </div>
                <a href="#" class="link link-hover">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>

        <p class="mt-8 text-center text-sm">
            Don't have an account?
            <a href="#" class="link font-medium">Sign up</a>
        </p>
    </div>

</body>

</html>
